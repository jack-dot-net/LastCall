services:
  - type: web
    name: last-call
    runtime: node
    plan: free
    region: oregon
    # --include=dev forces npm to install devDependencies (vite, typescript,
    # tailwindcss, etc.) even though Render sets NODE_ENV=production during
    # the build phase. Without it `npm run build` would fail with `vite: not
    # found`.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      # Belt-and-braces: also disable npm's "production install" mode so the
      # build script can resolve dev dependencies on its own. Render reads
      # this during both build and runtime; runtime is unaffected because
      # devDeps are already on disk by then.
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
